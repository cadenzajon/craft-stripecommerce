name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Validate composer.json
        run: composer validate --strict
      - name: PHP syntax check
        run: |
          set -e
          for f in $(find src -name '*.php'); do
            php -l "$f"
          done
